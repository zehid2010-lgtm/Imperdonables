<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Imperdonables Mobile Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
--bg:#07111f;
--bg2:#0f172a;
--text:#ebf2ff;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
}

.container{
max-width:560px;
margin:auto;
padding:10px;
}

.card{
background:#0f172a;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:14px;
margin-bottom:10px;
box-shadow:0 10px 30px rgba(0,0,0,.28);
}

.client-card-auditable{
border:2px solid #3b82f6;
box-shadow:0 0 0 1px rgba(59,130,246,.3),0 12px 30px rgba(0,0,0,.28);
}

.audit-badge{
display:inline-flex;
align-items:center;
gap:6px;
padding:6px 10px;
border-radius:999px;
font-size:11px;
font-weight:900;
background:rgba(59,130,246,.18);
color:#bfdbfe;
border:1px solid rgba(96,165,250,.45);
margin-top:8px;
}

.audit-dot{
width:8px;
height:8px;
border-radius:50%;
background:#60a5fa;
}

select,button{
width:100%;
height:46px;
border:none;
border-radius:14px;
margin-bottom:10px;
padding:0 12px;
font-weight:700;
}

select{
background:#1e293b;
color:white;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

.progress{
height:10px;
background:#1e293b;
border-radius:999px;
overflow:hidden;
margin-top:8px;
}

.bar{
height:100%;
}

.green{background:#10b981;}
.yellow{background:#facc15;}
.red{background:#f43f5e;}

.small{
font-size:12px;
color:#94a3b8;
margin-top:5px;
}

.title{
font-size:18px;
font-weight:900;
margin-bottom:5px;
}
</style>
</head>

<body>

<div class="container">

<select id="filtroAudit">
<option value="TODOS">Todos los clientes</option>
<option value="SI">Solo auditables</option>
</select>

<button onclick="render()">Actualizar</button>

<div id="clientes"></div>

</div>

<script>

const auditables = [
"3137513",
"3134404",
"3195677",
"3199087",
"3139681",
"3133715",
"3187093",
"3140038"
];

const clientes = [

{outnum:"3137513",cliente:"RONCEDO ALVARO",ruta:"41",jefe:"JUAREZ",avance:82},
{outnum:"3134404",cliente:"BOTTINI",ruta:"44",jefe:"JUAREZ",avance:55},
{outnum:"3195677",cliente:"ARGAÑARAZ",ruta:"45",jefe:"JUAREZ",avance:71},
{outnum:"3199087",cliente:"TODO PAN",ruta:"47",jefe:"JUAREZ",avance:90},
{outnum:"3139681",cliente:"EL MALIK",ruta:"48",jefe:"JUAREZ",avance:43},
{outnum:"3133715",cliente:"WU LIQING",ruta:"49",jefe:"JUAREZ",avance:62},
{outnum:"3187093",cliente:"FERRER",ruta:"42",jefe:"JUAREZ",avance:77},
{outnum:"3140038",cliente:"BOULLHESEN",ruta:"43",jefe:"JUAREZ",avance:69},

{outnum:"3001111",cliente:"CLIENTE NORMAL 1",ruta:"41",jefe:"JUAREZ",avance:65},
{outnum:"3001112",cliente:"CLIENTE NORMAL 2",ruta:"42",jefe:"JUAREZ",avance:74},
{outnum:"3001113",cliente:"CLIENTE NORMAL 3",ruta:"43",jefe:"JUAREZ",avance:88}

];

function isAuditable(outnum){
return auditables.includes(String(outnum));
}

function getColor(v){
if(v>=80) return "green";
if(v>=60) return "yellow";
return "red";
}

function render(){

let filtro=document.getElementById("filtroAudit").value;

let data=clientes.filter(c=>{
if(filtro==="SI") return isAuditable(c.outnum);
return true;
});

let html="";

data.forEach(item=>{

let aud=isAuditable(item.outnum);

html+=`
<div class="card ${aud?'client-card-auditable':''}">
<div class="title">${item.cliente}</div>

<div class="small">
Outnum ${item.outnum} · Ruta ${item.ruta} · ${item.jefe}
</div>

${aud?`
<div class="audit-badge">
<span class="audit-dot"></span>
Cliente auditable
</div>
`:''}

<div style="margin-top:10px;font-weight:800;">
Avance ${item.avance}%
</div>

<div class="progress">
<div class="bar ${getColor(item.avance)}" style="width:${item.avance}%"></div>
</div>

</div>
`;

});

document.getElementById("clientes").innerHTML=html;

}

render();

</script>

</body>
</html>
