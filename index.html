<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Imperdonables Auditables PRO</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#07111f;
color:white;
}

.card{
background:#0f172a;
border:1px solid #1e3a8a;
border-radius:18px;
padding:14px;
margin-bottom:12px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.audit{
border:2px solid #22c55e;
box-shadow:0 0 0 2px rgba(34,197,94,.2);
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:999px;
font-size:11px;
font-weight:700;
margin-top:6px;
}

.badge-aud{
background:#22c55e;
color:#001b08;
}

select{
width:100%;
padding:12px;
border-radius:12px;
background:#0f172a;
color:white;
border:1px solid #2563eb;
margin-bottom:10px;
}

.top{
position:sticky;
top:0;
background:#07111f;
padding:10px;
z-index:999;
}

.btn{
width:100%;
padding:12px;
background:#2563eb;
border:none;
color:white;
border-radius:12px;
font-weight:700;
cursor:pointer;
}

small{color:#94a3b8}
</style>
</head>

<body>

<div class="top">

<select id="filtroAudit">
<option value="TODOS">Todos los clientes</option>
<option value="SI">Solo auditables</option>
</select>

<button class="btn" onclick="render()">Actualizar</button>

</div>

<div style="padding:10px" id="clientes"></div>

<script>

const auditables = [
"3137513",
"3134404",
"3195677",
"3199087",
"3139681",
"3133715",
"3187093"
];

const clientes = [

{outnum:"3137513",nombre:"RONCEDO ALVARO",ruta:"41",avance:82},
{outnum:"3134404",nombre:"BOTTINI",ruta:"44",avance:55},
{outnum:"3195677",nombre:"ARGAÑARAZ",ruta:"45",avance:71},
{outnum:"3199087",nombre:"TODO PAN",ruta:"47",avance:90},
{outnum:"3139681",nombre:"EL MALIK",ruta:"48",avance:43},
{outnum:"3133715",nombre:"WU LIQING",ruta:"49",avance:62},
{outnum:"3187093",nombre:"FERRER",ruta:"42",avance:77},

{outnum:"3001111",nombre:"CLIENTE NORMAL 1",ruta:"41",avance:61},
{outnum:"3001112",nombre:"CLIENTE NORMAL 2",ruta:"41",avance:72},
{outnum:"3001113",nombre:"CLIENTE NORMAL 3",ruta:"44",avance:88}

];

function render(){

let filtro=document.getElementById("filtroAudit").value;

let data=clientes.filter(c=>{
if(filtro==="SI") return auditables.includes(c.outnum);
return true;
});

let html="";

data.forEach(c=>{

let aud=auditables.includes(c.outnum);

html+=`
<div class="card ${aud?'audit':''}">
<div style="font-size:18px;font-weight:700">${c.nombre}</div>
<small>Outnum ${c.outnum} · Ruta ${c.ruta}</small>

${aud?'<div class="badge badge-aud">CLIENTE AUDITABLE</div>':''}

<div style="margin-top:10px">
Avance: <b>${c.avance}%</b>
</div>

<div style="height:10px;background:#1e293b;border-radius:99px;margin-top:8px;overflow:hidden">
<div style="width:${c.avance}%;height:100%;background:${c.avance>=80?'#22c55e':c.avance>=60?'#eab308':'#ef4444'}"></div>
</div>

</div>
`;

});

document.getElementById("clientes").innerHTML=html;

}

render();

</script>

</body>
</html>
