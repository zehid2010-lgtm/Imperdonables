<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Imperdonables Mobile Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0f172a;
      --text:#ebf2ff;
      --blueBorder:rgba(96,165,250,.70);
      --blueGlow:rgba(59,130,246,.30);
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
    }

    body{
      overflow-x:hidden;
    }

    .app-shell{
      max-width:560px;
      margin:0 auto;
      height:100vh;
      display:flex;
      flex-direction:column;
      padding:6px 8px 8px;
      gap:6px;
    }

    .glass{
      background:rgba(17,28,49,.82);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }

    .chip{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .btn{
      min-height:34px;
      height:34px;
      border-radius:14px;
      padding:6px 10px;
      font-weight:800;
      transition:.18s ease;
      font-size:12px;
    }

    .btn:active{
      transform:scale(.98);
    }

    .hidden-view{
      display:none !important;
    }

    .line-clamp-1{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .scroll-soft{
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .scroll-soft::-webkit-scrollbar{
      width:8px;
      height:8px;
    }

    .scroll-soft::-webkit-scrollbar-thumb{
      background:#334155;
      border-radius:999px;
    }

    .top-fixed{
      flex:0 0 auto;
    }

    .top-hero{
      background:rgba(7,17,31,.98);
      padding:8px 8px 4px;
    }

    .filters-shell{
      background:rgba(7,17,31,.99);
      margin-top:0;
      padding:8px;
    }

    .filter-control{
      width:100%;
      height:32px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(37,99,235,.22), rgba(37,99,235,.14));
      border:1px solid var(--blueBorder);
      color:var(--text);
      padding:0 10px;
      outline:none;
      font-size:12px;
      font-weight:700;
      box-shadow:0 0 0 1px rgba(37,99,235,.10) inset;
    }

    .filter-control:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px var(--blueGlow);
    }

    .filter-control option{
      background:#0f172a;
      color:#ebf2ff;
    }

    .filter-label{
      font-size:10px;
      color:#93c5fd;
      margin-bottom:3px;
      display:block;
      font-weight:800;
      letter-spacing:.02em;
      text-transform:uppercase;
      line-height:1;
    }

    .search-pro{
      width:100%;
      height:32px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(37,99,235,.18), rgba(2,6,23,.45));
      border:1px solid var(--blueBorder);
      color:var(--text);
      padding:0 12px;
      outline:none;
      font-size:12px;
    }

    .search-pro::placeholder{
      color:#94a3b8;
    }

    .search-pro:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 3px var(--blueGlow);
    }

    .btn-primary-blue{
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      color:white;
      border:1px solid rgba(147,197,253,.35);
      box-shadow:0 10px 22px rgba(37,99,235,.24);
    }

    .btn-secondary-blue{
      background:rgba(37,99,235,.14);
      color:#dbeafe;
      border:1px solid rgba(96,165,250,.35);
    }

    .kpi-value{
      font-size:1rem;
      line-height:1;
      font-weight:900;
      margin-top:3px;
    }

    .hero-kpis{
      gap:6px !important;
      margin-top:8px !important;
    }

    .hero-kpis .chip{
      min-height:50px;
      padding:7px 9px !important;
      border-radius:16px;
    }

    .hero-kpis .chip .text-\[10px\]{
      font-size:9px !important;
    }

    .content-area{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      margin-top:-2px;
    }

    #clientesView,
    #detalleView{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
    }

    .list-head{
      flex:0 0 auto;
      padding:0 4px 4px;
    }

    #cardsContainer{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding:0 0 8px;
    }

    .client-card{
      padding:10px !important;
      margin-bottom:6px;
      border-radius:18px !important;
    }

    .client-card-active{
      border-color:#22d3ee !important;
      box-shadow:0 0 0 1px rgba(34,211,238,.14), 0 12px 30px rgba(0,0,0,.28);
    }

    .mini-progress{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      overflow:hidden;
    }

    #detailPanel{
      flex:1 1 auto;
      min-height:0;
      overflow:auto;
      padding-right:2px;
    }

    .top-hero .title-main{
      font-size:0.95rem;
      line-height:1.05;
    }

    .top-hero .title-sub{
      font-size:10px;
      line-height:1.1;
    }

    .top-hero .brand-top{
      font-size:9px;
      letter-spacing:.18em;
      line-height:1;
    }

    .top-hero .logo-box{
      height:38px;
      width:38px;
      border-radius:16px;
      font-size:15px;
    }

    .filters-header-title{
      font-size:13px;
      line-height:1;
    }

    .filters-header-sub{
      font-size:10px;
      line-height:1.1;
      margin-top:2px;
    }

    .badge-activos{
      font-size:10px;
      padding:5px 9px;
      line-height:1;
    }

    .filters-grid{
      gap:8px !important;
      margin-top:8px !important;
    }

    .btn-grid{
      gap:8px !important;
      margin-top:8px !important;
    }

    .section-title{
      font-size:13px;
      line-height:1;
    }

    .section-subtitle{
      font-size:11px;
      line-height:1.1;
      margin-top:2px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="top-fixed">
      <section id="heroCard" class="glass rounded-[22px] p-3 top-hero">
        <div class="flex items-center gap-3">
          <div class="logo-box bg-cyan-400 flex items-center justify-center text-slate-950 font-black">I</div>
          <div class="min-w-0">
            <div class="brand-top uppercase text-slate-400">Mobile Pro</div>
            <h1 class="title-main font-black">Imperdonables</h1>
            <p class="title-sub text-slate-400">Vista optimizada para celular</p>
          </div>
        </div>

        <div class="hero-kpis grid grid-cols-2">
          <div class="chip">
            <div class="text-[10px] text-slate-400">Clientes</div>
            <div id="kpiClientes" class="kpi-value">0</div>
          </div>
          <div class="chip">
            <div class="text-[10px] text-slate-400">Avance</div>
            <div id="kpiAvance" class="kpi-value">0,0%</div>
          </div>
          <div class="chip">
            <div class="text-[10px] text-slate-400">Imperdonables</div>
            <div id="kpiImperdonables" class="kpi-value">0</div>
          </div>
          <div class="chip">
            <div class="text-[10px] text-slate-400">Cumplidos</div>
            <div id="kpiCumplidos" class="kpi-value">0</div>
          </div>
        </div>
      </section>

      <section id="filtersCard" class="glass rounded-[22px] p-3 filters-shell">
        <div class="flex items-center justify-between mb-2">
          <div>
            <div class="filters-header-title font-black text-blue-300">Filtros</div>
            <div class="filters-header-sub text-slate-400">Visualización rápida y comercial</div>
          </div>
          <div class="badge-activos rounded-full bg-blue-500/15 border border-blue-400/30 text-blue-200 font-bold">
            Activos
          </div>
        </div>

        <label class="filter-label">Buscar</label>
        <input
          id="searchInput"
          type="text"
          placeholder="Cliente, Outnum, Ruta, Jefe"
          class="search-pro"
        />

        <div class="filters-grid grid grid-cols-2">
          <div>
            <label class="filter-label">Segmento</label>
            <select id="segmentoFilter" class="filter-control"></select>
          </div>

          <div>
            <label class="filter-label">Ruta</label>
            <select id="rutaFilter" class="filter-control"></select>
          </div>

          <div>
            <label class="filter-label">Jefe</label>
            <select id="jefeFilter" class="filter-control"></select>
          </div>

          <div>
            <label class="filter-label">Estado</label>
            <select id="estadoFilter" class="filter-control">
              <option value="TODOS">Todos los estados</option>
              <option value="ALTO">Alto</option>
              <option value="MEDIO">Medio</option>
              <option value="BAJO">Bajo</option>
            </select>
          </div>
        </div>

        <div class="btn-grid grid grid-cols-3">
          <button id="tabClientes" class="btn btn-primary-blue">Clientes</button>
          <button id="tabDetalle" class="btn btn-secondary-blue">Detalle</button>
          <button id="reloadBtn" class="btn btn-secondary-blue">Recargar</button>
        </div>
      </section>
    </div>

    <div class="content-area">
      <section id="clientesView">
        <div class="list-head">
          <div class="section-title font-black">Listado</div>
          <div id="resultInfo" class="section-subtitle text-slate-400">Cargando datos...</div>
        </div>
        <div id="cardsContainer" class="scroll-soft"></div>
      </section>

      <section id="detalleView" class="hidden-view">
        <div id="detailPanel" class="space-y-2 scroll-soft">
          <div class="glass rounded-[24px] p-5 text-center text-slate-400">Seleccioná un cliente.</div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const CONFIG = {
      sheets: [
        { segmento: 'AUTOSERVICIO', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1897406888&single=true&output=csv' },
        { segmento: 'ORO',          url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1674759979&single=true&output=csv' },
        { segmento: 'PLATA',        url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=2007565552&single=true&output=csv' },
        { segmento: 'KIOSCO',       url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1866612683&single=true&output=csv' },
        { segmento: 'BRONCE',       url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1006300389&single=true&output=csv' }
      ],
      headerAliases: {}
    };

    let rawData = [];
    let filteredData = [];
    let selectedKey = null;

    function norm(v){ return String(v ?? '').trim(); }
    function normUpper(v){ return norm(v).toUpperCase(); }

    function pct(n, d){
      if (!d || d <= 0) return 0;
      return (n / d) * 100;
    }

    function formatPct(value){
      const num = Number(value || 0);
      return `${num.toFixed(1).replace('.', ',')}%`;
    }

    function esc(v){
      return String(v ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function uniq(values){
      return [...new Set(values.filter(Boolean))]
        .sort((a,b) => String(a).localeCompare(String(b), 'es', { numeric:true }));
    }

    function getDisplayName(name){
      return CONFIG.headerAliases[name] || name;
    }

    function parseCSVLine(line){
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCSV(text){
      return text
        .replace(/^\uFEFF/, '')
        .split(/\r?\n/)
        .filter(line => line.trim() !== '')
        .map(parseCSVLine);
    }

    function getColorClass(p){
      if (p >= 100) return 'bg-emerald-500';
      if (p >= 80) return 'bg-amber-400';
      return 'bg-rose-500';
    }

    function getTextState(p){
      if (p >= 100) return 'ALTO';
      if (p >= 80) return 'MEDIO';
      return 'BAJO';
    }

    function getBadgeHtml(done){
      return done
        ? '<span class="inline-flex items-center justify-center h-7 px-3 rounded-full bg-emerald-500 text-slate-950 text-[11px] font-black">OK</span>'
        : '<span class="inline-flex items-center justify-center h-7 px-3 rounded-full bg-rose-500 text-white text-[11px] font-black">NO</span>';
    }

    function isBiBooleanValue(rawVal){
      const v = normUpper(rawVal);
      return ['0', '0.0', '1', '1.0', 'SI', 'NO', 'OK', 'CUMPLIDO'].includes(v);
    }

    function isDoneValue(rawVal){
      const v = normUpper(rawVal);
      return ['1', '1.0', 'SI', 'OK', 'CUMPLIDO'].includes(v);
    }

    function findColumnIndex(headersA, headersB, target){
      const t = normUpper(target);
      for (let i = 0; i < Math.max(headersA.length, headersB.length); i++) {
        const a = normUpper(headersA[i]);
        const b = normUpper(headersB[i]);
        if (a === t || b === t) return i;
      }
      return -1;
    }

    function getImperdonableName(top, bottom, idx){
      const a = norm(top[idx]);
      const b = norm(bottom[idx]);
      return [a, b].filter(Boolean).join(' ').trim() || `Imperdonable ${idx + 1}`;
    }

    function buildClientRecords(rows, segmento){
      if (!rows.length || rows.length < 3) return [];

      const row1 = rows[0] || [];
      const row2 = rows[1] || [];
      const row3 = rows[2] || [];

      const hasThreeHeaderRows = normUpper(row3[0]) === 'DETALLE';
      const metaHeaderRow = hasThreeHeaderRows ? row3 : row2;
      const displayHeaderTop = row1;
      const displayHeaderBottom = hasThreeHeaderRows ? row2 : [];
      const dataRows = rows.slice(hasThreeHeaderRows ? 3 : 2);

      const detalleIdx = metaHeaderRow.findIndex(v => normUpper(v) === 'DETALLE');
      const territorioIdx = metaHeaderRow.findIndex(v => normUpper(v) === 'TERRITORIO');
      const cediIdx = metaHeaderRow.findIndex(v => normUpper(v) === 'CEDI');
      const jefeIdx = metaHeaderRow.findIndex(v => normUpper(v) === 'JEFE');
      const rutaIdx = metaHeaderRow.findIndex(v => normUpper(v) === 'RUTA');
      const outclIdx = metaHeaderRow.findIndex(v => normUpper(v) === 'OUT-CL');

      if (outclIdx === -1) return [];

      const totalIdx = findColumnIndex(displayHeaderTop, displayHeaderBottom, 'Total');
      const dynamicStart = outclIdx + 1;
      const dynamicEndExclusive = totalIdx > -1 ? totalIdx : metaHeaderRow.length;

      let lastDetalle = '';
      let lastTerritorio = '';
      let lastCedi = '';
      let lastJefe = '';
      let lastRuta = '';

      const clients = [];

      for (const row of dataRows) {
        const outcl = norm(row[outclIdx]);
        if (!outcl) continue;

        lastDetalle = (detalleIdx > -1 ? norm(row[detalleIdx]) : '') || lastDetalle;
        lastTerritorio = (territorioIdx > -1 ? norm(row[territorioIdx]) : '') || lastTerritorio;
        lastCedi = (cediIdx > -1 ? norm(row[cediIdx]) : '') || lastCedi;
        lastJefe = (jefeIdx > -1 ? norm(row[jefeIdx]) : '') || lastJefe;
        lastRuta = (rutaIdx > -1 ? norm(row[rutaIdx]) : '') || lastRuta;

        const parts = outcl.split(' - ');
        const outnum = norm(parts[0]);
        const cliente = norm(parts.slice(1).join(' - ')) || outcl;

        const imperdonables = [];
        let cumplidos = 0;
        let totalValidos = 0;

        for (let i = dynamicStart; i < dynamicEndExclusive; i++) {
          const nombre = getImperdonableName(displayHeaderTop, displayHeaderBottom, i);
          const rawVal = norm(row[i]);

          if (!isBiBooleanValue(rawVal)) continue;

          totalValidos++;
          const done = isDoneValue(rawVal);
          if (done) cumplidos++;

          imperdonables.push({ nombre, cumplido: done, rawVal });
        }

        clients.push({
          key: `${segmento}|${outnum}|${cliente}`,
          segmento,
          outnum,
          cliente,
          ruta: lastRuta,
          jefe: lastJefe,
          detalle: lastDetalle,
          territorio: lastTerritorio,
          cedi: lastCedi,
          totalImperdonables: totalValidos,
          cumplidos,
          porcentaje: pct(cumplidos, totalValidos),
          imperdonables
        });
      }

      return clients;
    }

    async function fetchCSV(url){
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('No se pudo leer el CSV');
      const text = await res.text();
      return parseCSV(text);
    }

    async function loadData(){
      rawData = [];
      filteredData = [];

      document.getElementById('resultInfo').textContent = 'Cargando datos...';
      document.getElementById('cardsContainer').innerHTML =
        '<div class="glass rounded-[24px] p-5 text-center text-slate-400">Cargando información...</div>';

      const errors = [];

      for (const sheet of CONFIG.sheets) {
        try {
          const rows = await fetchCSV(sheet.url);
          const clients = buildClientRecords(rows, sheet.segmento);
          rawData.push(...clients);
        } catch (err) {
          console.error('Error en hoja', sheet.segmento, err);
          errors.push(sheet.segmento);
        }
      }

      populateFilters();
      applyFilters();

      if (filteredData.length && !selectedKey) selectedKey = filteredData[0].key;
      renderDetail();

      if (!rawData.length) {
        document.getElementById('resultInfo').textContent = 'No se pudieron cargar datos.';
        document.getElementById('cardsContainer').innerHTML =
          '<div class="glass rounded-[24px] p-5 text-center text-slate-400">No se encontraron datos válidos.</div>';
      } else if (errors.length) {
        document.getElementById('resultInfo').textContent =
          `${filteredData.length} clientes visibles · Error en: ${errors.join(', ')}`;
      }
    }

    function fillSelect(el, values, firstLabel){
      el.innerHTML =
        `<option value="TODOS">${firstLabel}</option>` +
        values.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
    }

    function populateFilters(){
      fillSelect(
        document.getElementById('segmentoFilter'),
        uniq(rawData.map(x => x.segmento)),
        'Todos los segmentos'
      );

      updateRutaFilter();
      updateJefeFilter();
    }

    function updateRutaFilter(){
      const segmento = document.getElementById('segmentoFilter').value;
      const rutaSelect = document.getElementById('rutaFilter');
      const rutaActual = rutaSelect.value || 'TODOS';

      const base = rawData.filter(item =>
        segmento === 'TODOS' || item.segmento === segmento
      );

      const rutas = uniq(base.map(x => x.ruta));
      fillSelect(rutaSelect, rutas, 'Todas las rutas');

      if (rutas.includes(rutaActual)) {
        rutaSelect.value = rutaActual;
      } else {
        rutaSelect.value = 'TODOS';
      }
    }

    function updateJefeFilter(){
      const segmento = document.getElementById('segmentoFilter').value;
      const ruta = document.getElementById('rutaFilter').value;
      const jefeSelect = document.getElementById('jefeFilter');
      const jefeActual = jefeSelect.value || 'TODOS';

      const base = rawData.filter(item =>
        (segmento === 'TODOS' || item.segmento === segmento) &&
        (ruta === 'TODOS' || item.ruta === ruta)
      );

      const jefes = uniq(base.map(x => x.jefe));
      fillSelect(jefeSelect, jefes, 'Todos los jefes');

      if (jefes.includes(jefeActual)) {
        jefeSelect.value = jefeActual;
      } else {
        jefeSelect.value = 'TODOS';
      }
    }

    function applyFilters(){
      const q = normUpper(document.getElementById('searchInput').value);
      const segmento = document.getElementById('segmentoFilter').value;
      const ruta = document.getElementById('rutaFilter').value;
      const jefe = document.getElementById('jefeFilter').value;
      const estado = document.getElementById('estadoFilter').value;

      filteredData = rawData.filter(item => {
        const textHit = !q || [
          item.cliente, item.outnum, item.ruta, item.jefe,
          item.segmento, item.detalle, item.territorio, item.cedi
        ].some(v => normUpper(v).includes(q));

        return (segmento === 'TODOS' || item.segmento === segmento) &&
               (ruta === 'TODOS' || item.ruta === ruta) &&
               (jefe === 'TODOS' || item.jefe === jefe) &&
               (estado === 'TODOS' || getTextState(item.porcentaje) === estado) &&
               textHit;
      }).sort((a, b) => {
        if (String(a.ruta) !== String(b.ruta)) {
          return String(a.ruta).localeCompare(String(b.ruta), 'es', { numeric:true });
        }
        return String(a.cliente).localeCompare(String(b.cliente), 'es');
      });

      if (selectedKey && !filteredData.some(x => x.key === selectedKey)) {
        selectedKey = filteredData[0]?.key || null;
      }

      renderKPIs();
      renderCards();
      renderDetail();
    }

    function renderKPIs(){
      const totalClientes = filteredData.length;
      const totalImperdonables = filteredData.reduce((a, b) => a + Number(b.totalImperdonables || 0), 0);
      const totalCumplidos = filteredData.reduce((a, b) => a + Number(b.cumplidos || 0), 0);
      const avance = pct(totalCumplidos, totalImperdonables);

      document.getElementById('kpiClientes').textContent = totalClientes;
      document.getElementById('kpiImperdonables').textContent = totalImperdonables;
      document.getElementById('kpiCumplidos').textContent = totalCumplidos;
      document.getElementById('kpiAvance').textContent = formatPct(avance);
      document.getElementById('resultInfo').textContent = `${totalClientes} clientes visibles`;
    }

    function renderCards(){
      const box = document.getElementById('cardsContainer');

      if (!filteredData.length) {
        box.innerHTML = '<div class="glass rounded-[24px] p-5 text-center text-slate-400">No hay clientes con esos filtros.</div>';
        return;
      }

      box.innerHTML = filteredData.map(item => {
        const barColor = getColorClass(item.porcentaje);
        const pending = Math.max(item.totalImperdonables - item.cumplidos, 0);
        const activeClass = selectedKey === item.key ? 'client-card-active' : 'border-white/5';
        const safeKey = item.key.replace(/'/g, "\\'");

        return `
          <button onclick="selectClient('${safeKey}')" class="client-card glass w-full text-left border ${activeClass}">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <div class="text-[10px] text-slate-400 uppercase tracking-wide">${esc(item.segmento)} · Ruta ${esc(item.ruta || '-')}</div>
                <div class="font-black text-[16px] leading-tight mt-1">${esc(item.cliente || '-')}</div>
                <div class="text-[11px] text-slate-300 mt-1 line-clamp-1">Outnum ${esc(item.outnum || '-')} · ${esc(item.jefe || '-')}</div>
                <div class="text-[10px] text-slate-500 mt-1 line-clamp-1">${esc(item.detalle || '-')} · ${esc(item.territorio || '-')}</div>
              </div>
              <div class="shrink-0 rounded-2xl px-3 py-2 ${barColor} text-slate-950 font-black text-[12px]">${formatPct(item.porcentaje)}</div>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-3">
              <div class="chip rounded-2xl p-2">
                <div class="text-[10px] text-slate-400">Total</div>
                <div class="text-base font-black mt-1">${item.totalImperdonables}</div>
              </div>
              <div class="chip rounded-2xl p-2">
                <div class="text-[10px] text-slate-400">OK</div>
                <div class="text-base font-black mt-1">${item.cumplidos}</div>
              </div>
              <div class="chip rounded-2xl p-2">
                <div class="text-[10px] text-slate-400">Pend.</div>
                <div class="text-base font-black mt-1">${pending}</div>
              </div>
            </div>

            <div class="mt-3">
              <div class="flex items-center justify-between text-[10px] text-slate-400 mb-2">
                <span>Avance</span>
                <span>${item.cumplidos}/${item.totalImperdonables}</span>
              </div>
              <div class="mini-progress">
                <div class="h-full ${barColor}" style="width:${Math.min(item.porcentaje, 100)}%"></div>
              </div>
            </div>
          </button>
        `;
      }).join('');
    }

    function renderDetail(){
      const panel = document.getElementById('detailPanel');
      const item = rawData.find(x => x.key === selectedKey) || filteredData[0];

      if (!item) {
        panel.innerHTML = '<div class="glass rounded-[24px] p-5 text-center text-slate-400">Seleccioná un cliente.</div>';
        return;
      }

      selectedKey = item.key;
      const barColor = getColorClass(item.porcentaje);
      const pendientes = Math.max(item.totalImperdonables - item.cumplidos, 0);

      panel.innerHTML = `
        <div class="glass rounded-[24px] p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <div class="text-[11px] text-slate-400 uppercase tracking-wide">${esc(item.segmento)} · Ruta ${esc(item.ruta || '-')}</div>
              <div class="text-[20px] font-black leading-tight mt-1">${esc(item.cliente || '-')}</div>
              <div class="text-sm text-slate-300 mt-1">Outnum ${esc(item.outnum || '-')}</div>
              <div class="text-sm text-slate-400">Jefe: ${esc(item.jefe || '-')}</div>
              <div class="text-sm text-slate-400">Detalle: ${esc(item.detalle || '-')} · Territorio: ${esc(item.territorio || '-')}</div>
              <div class="text-sm text-slate-400">Cedi: ${esc(item.cedi || '-')}</div>
            </div>
            <div class="shrink-0 rounded-2xl px-3 py-2 ${barColor} text-slate-950 font-black">${formatPct(item.porcentaje)}</div>
          </div>

          <div class="grid grid-cols-3 gap-2 mt-4">
            <div class="chip rounded-2xl p-3">
              <div class="text-[10px] text-slate-400">Total</div>
              <div class="text-xl font-black mt-1">${item.totalImperdonables}</div>
            </div>
            <div class="chip rounded-2xl p-3">
              <div class="text-[10px] text-slate-400">OK</div>
              <div class="text-xl font-black mt-1">${item.cumplidos}</div>
            </div>
            <div class="chip rounded-2xl p-3">
              <div class="text-[10px] text-slate-400">Pend.</div>
              <div class="text-xl font-black mt-1">${pendientes}</div>
            </div>
          </div>

          <div class="mt-4">
            <div class="flex items-center justify-between text-[11px] text-slate-400 mb-2">
              <span>Avance general</span>
              <span>${item.cumplidos}/${item.totalImperdonables}</span>
            </div>
            <div class="mini-progress">
              <div class="h-full ${barColor}" style="width:${Math.min(item.porcentaje,100)}%"></div>
            </div>
          </div>
        </div>

        <div class="glass rounded-[24px] p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="text-base font-black">Imperdonables</div>
            <div class="text-xs text-slate-400">Rojo = pendiente · Verde = cumplido</div>
          </div>

          <div class="space-y-2 max-h-[55vh] overflow-auto scroll-soft pr-1">
            ${
              item.imperdonables.length
                ? item.imperdonables.map(imp => `
                  <div class="rounded-2xl border ${imp.cumplido ? 'border-emerald-500/25 bg-emerald-500/10' : 'border-rose-500/25 bg-rose-500/10'} px-3 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0 flex-1">
                      <div class="font-bold text-sm leading-tight ${imp.cumplido ? 'line-through text-emerald-300' : 'text-rose-200'}">${esc(getDisplayName(imp.nombre))}</div>
                      <div class="text-[11px] text-slate-400 mt-1">Valor base: ${esc(imp.rawVal || '-')}</div>
                    </div>
                    <div class="shrink-0">${getBadgeHtml(imp.cumplido)}</div>
                  </div>
                `).join('')
                : '<div class="text-slate-400 text-sm">Sin imperdonables activos.</div>'
            }
          </div>
        </div>
      `;
    }

    function selectClient(key){
      selectedKey = key;
      renderCards();
      renderDetail();
      showDetalle();
    }
    window.selectClient = selectClient;

    function showClientes(){
      document.getElementById('clientesView').classList.remove('hidden-view');
      document.getElementById('detalleView').classList.add('hidden-view');
      document.getElementById('tabClientes').className = 'btn btn-primary-blue';
      document.getElementById('tabDetalle').className = 'btn btn-secondary-blue';
    }

    function showDetalle(){
      document.getElementById('clientesView').classList.add('hidden-view');
      document.getElementById('detalleView').classList.remove('hidden-view');
      document.getElementById('tabDetalle').className = 'btn btn-primary-blue';
      document.getElementById('tabClientes').className = 'btn btn-secondary-blue';
    }

    document.getElementById('tabClientes').addEventListener('click', showClientes);
    document.getElementById('tabDetalle').addEventListener('click', showDetalle);
    document.getElementById('searchInput').addEventListener('input', applyFilters);

    document.getElementById('segmentoFilter').addEventListener('change', () => {
      updateRutaFilter();
      updateJefeFilter();
      applyFilters();
    });

    document.getElementById('rutaFilter').addEventListener('change', () => {
      updateJefeFilter();
      applyFilters();
    });

    document.getElementById('jefeFilter').addEventListener('change', applyFilters);
    document.getElementById('estadoFilter').addEventListener('change', applyFilters);
    document.getElementById('reloadBtn').addEventListener('click', loadData);

    loadData();
  </script>
</body>
</html>
