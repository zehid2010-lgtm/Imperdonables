<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Imperdonables Mobile Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{
      --bg:#07111f;
      --bg2:#0f172a;
      --card:#111c31;
      --line:#24324a;
      --text:#ebf2ff;
      --muted:#94a3b8;
      --ok:#22c55e;
      --mid:#f59e0b;
      --bad:#ef4444;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      padding:0;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--text);
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
    }
    .app-shell{
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
      padding:12px 12px 100px;
    }
    .glass{
      background:rgba(17,28,49,.82);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 10px 30px rgba(0,0,0,.28);
    }
    .chip{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }
    .btn{
      min-height:44px;
      border-radius:16px;
      padding:10px 14px;
      font-weight:800;
    }
    .hidden-view{display:none!important}
    .line-clamp-1{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .scroll-soft::-webkit-scrollbar{
      width:8px;
      height:8px;
    }
    .scroll-soft::-webkit-scrollbar-thumb{
      background:#334155;
      border-radius:999px;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="glass rounded-[28px] p-4 sticky top-0 z-20" style="background:rgba(7,17,31,.92)">
      <div class="flex items-center gap-3">
        <div class="h-12 w-12 rounded-2xl bg-cyan-400 flex items-center justify-center text-slate-950 text-xl font-black">I</div>
        <div class="min-w-0">
          <div class="text-[11px] uppercase tracking-[0.2em] text-slate-400">Mobile Pro</div>
          <h1 class="text-xl font-black leading-tight">Imperdonables</h1>
          <p class="text-xs text-slate-400">Vista optimizada para celular</p>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-2 mt-4">
        <div class="chip rounded-2xl p-3">
          <div class="text-[11px] text-slate-400">Clientes</div>
          <div id="kpiClientes" class="text-2xl font-black leading-none mt-1">0</div>
        </div>
        <div class="chip rounded-2xl p-3">
          <div class="text-[11px] text-slate-400">Avance</div>
          <div id="kpiAvance" class="text-2xl font-black leading-none mt-1">0%</div>
        </div>
        <div class="chip rounded-2xl p-3">
          <div class="text-[11px] text-slate-400">Imperdonables</div>
          <div id="kpiImperdonables" class="text-2xl font-black leading-none mt-1">0</div>
        </div>
        <div class="chip rounded-2xl p-3">
          <div class="text-[11px] text-slate-400">Cumplidos</div>
          <div id="kpiCumplidos" class="text-2xl font-black leading-none mt-1">0</div>
        </div>
      </div>
    </section>

    <section class="glass rounded-[28px] p-4 mt-3">
      <label class="text-[11px] text-slate-400 block mb-1">Buscar</label>
      <input id="searchInput" type="text" placeholder="Cliente, Outnum, Ruta, Jefe"
        class="w-full h-12 rounded-2xl bg-slate-950/50 border border-slate-700 px-4 outline-none focus:border-cyan-400 text-base" />

      <div class="grid grid-cols-2 gap-2 mt-3">
        <select id="segmentoFilter" class="h-12 rounded-2xl bg-slate-950/50 border border-slate-700 px-3 text-sm outline-none focus:border-cyan-400"></select>
        <select id="rutaFilter" class="h-12 rounded-2xl bg-slate-950/50 border border-slate-700 px-3 text-sm outline-none focus:border-cyan-400"></select>
        <select id="jefeFilter" class="h-12 rounded-2xl bg-slate-950/50 border border-slate-700 px-3 text-sm outline-none focus:border-cyan-400"></select>
        <select id="estadoFilter" class="h-12 rounded-2xl bg-slate-950/50 border border-slate-700 px-3 text-sm outline-none focus:border-cyan-400">
          <option value="TODOS">Todos los estados</option>
          <option value="ALTO">Alto</option>
          <option value="MEDIO">Medio</option>
          <option value="BAJO">Bajo</option>
        </select>
      </div>

      <div class="grid grid-cols-3 gap-2 mt-3">
        <button id="tabClientes" class="btn bg-cyan-400 text-slate-950">Clientes</button>
        <button id="tabDetalle" class="btn chip">Detalle</button>
        <button id="reloadBtn" class="btn chip">Recargar</button>
      </div>
    </section>

    <section id="clientesView" class="mt-3 space-y-3">
      <div class="flex items-center justify-between px-1">
        <div>
          <div class="text-sm font-black">Listado</div>
          <div id="resultInfo" class="text-xs text-slate-400">Cargando datos...</div>
        </div>
      </div>
      <div id="cardsContainer" class="space-y-3"></div>
    </section>

    <section id="detalleView" class="mt-3 hidden-view">
      <div id="detailPanel" class="space-y-3">
        <div class="glass rounded-[28px] p-5 text-center text-slate-400">Seleccioná un cliente.</div>
      </div>
    </section>
  </div>

  <script>
    const CONFIG = {
      sheets: [
        { segmento: 'AUTOSERVICIO', url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1897406888&single=true&output=csv' },
        { segmento: 'ORO',          url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1674759979&single=true&output=csv' },
        { segmento: 'PLATA',        url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=2007565552&single=true&output=csv' },
        { segmento: 'KIOSCO',       url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1866612683&single=true&output=csv' },
        { segmento: 'BRONCE',       url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTJYwdbpcF8pL1OkOQc2ESZHPkIvNN6IRoCabAiE3GGKFoFNVH0_Rpfqsj8bxnyw/pub?gid=1006300389&single=true&output=csv' }
      ],
      headerAliases: {
        // 'Nombre real del Excel': 'Nombre visible en la app'
      }
    };

    let rawData = [];
    let filteredData = [];
    let selectedKey = null;

    function norm(v){ return String(v ?? '').trim(); }
    function normUpper(v){ return norm(v).toUpperCase(); }
    function pct(n,d){ return !d ? 0 : Math.round((n/d)*100); }

    function esc(v){
      return String(v ?? '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;')
        .replace(/'/g,'&#039;');
    }

    function uniq(values){
      return [...new Set(values.filter(Boolean))].sort((a,b)=>String(a).localeCompare(String(b),'es'));
    }

    function getDisplayName(name){
      return CONFIG.headerAliases[name] || name;
    }

    function parseCSVLine(line){
      const result = [];
      let current = '';
      let inQuotes = false;

      for(let i=0; i<line.length; i++){
        const char = line[i];
        const next = line[i + 1];

        if(char === '"'){
          if(inQuotes && next === '"'){
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if(char === ',' && !inQuotes){
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function parseCSV(text){
      return text
        .replace(/^\uFEFF/, '')
        .split(/\r?\n/)
        .filter(line => line.trim() !== '')
        .map(parseCSVLine);
    }

    function getColorClass(p){
      if(p >= 100) return 'bg-emerald-500';
      if(p >= 80) return 'bg-amber-400';
      return 'bg-rose-500';
    }

    function getTextState(p){
      if(p >= 100) return 'ALTO';
      if(p >= 80) return 'MEDIO';
      return 'BAJO';
    }

    function getBadgeHtml(done){
      return done
        ? '<span class="inline-flex items-center justify-center h-7 px-3 rounded-full bg-emerald-500 text-slate-950 text-[11px] font-black">OK</span>'
        : '<span class="inline-flex items-center justify-center h-7 px-3 rounded-full bg-rose-500 text-white text-[11px] font-black">NO</span>';
    }

    async function fetchCSV(url){
      const res = await fetch(url);
      if(!res.ok) throw new Error('No se pudo leer el CSV');
      const text = await res.text();
      return parseCSV(text);
    }

    function buildClientRecords(rows, segmento){
      if(!rows.length || rows.length < 3) return [];

      const row1 = rows[0] || [];
      const row2 = rows[1] || [];
      const row3 = rows[2] || [];

      const hasThreeHeaderRows = norm(row3[0]) === 'Detalle';
      const metaHeaderRow = hasThreeHeaderRows ? row3 : row2;
      const displayHeaderTop = row1;
      const displayHeaderBottom = hasThreeHeaderRows ? row2 : [];
      const dataRows = rows.slice(hasThreeHeaderRows ? 3 : 2);

      const detalleIdx = metaHeaderRow.indexOf('Detalle');
      const territorioIdx = metaHeaderRow.indexOf('Territorio');
      const cediIdx = metaHeaderRow.indexOf('Cedi');
      const jefeIdx = metaHeaderRow.indexOf('Jefe');
      const rutaIdx = metaHeaderRow.indexOf('Ruta');
      const outclIdx = metaHeaderRow.indexOf('Out-CL');

      if(outclIdx === -1) return [];

      const dynamicStart = outclIdx + 1;
      const dynamicEnd = metaHeaderRow.length;

      let lastDetalle = '';
      let lastTerritorio = '';
      let lastCedi = '';
      let lastJefe = '';
      let lastRuta = '';

      const clients = [];

      for(const row of dataRows){
        const outcl = norm(row[outclIdx]);
        if(!outcl) continue;

        lastDetalle = (detalleIdx > -1 ? norm(row[detalleIdx]) : '') || lastDetalle;
        lastTerritorio = (territorioIdx > -1 ? norm(row[territorioIdx]) : '') || lastTerritorio;
        lastCedi = (cediIdx > -1 ? norm(row[cediIdx]) : '') || lastCedi;
        lastJefe = (jefeIdx > -1 ? norm(row[jefeIdx]) : '') || lastJefe;
        lastRuta = (rutaIdx > -1 ? norm(row[rutaIdx]) : '') || lastRuta;

        const parts = outcl.split(' - ');
        const outnum = norm(parts[0]);
        const cliente = norm(parts.slice(1).join(' - ')) || outcl;

        const imperdonables = [];
        let cumplidos = 0;

        for(let i = dynamicStart; i < dynamicEnd; i++){
          const top = norm(displayHeaderTop[i]);
          const bottom = norm(displayHeaderBottom[i]);
          let nombre = hasThreeHeaderRows
            ? (bottom || top || `Imperdonable ${i - dynamicStart + 1}`)
            : (top || `Imperdonable ${i - dynamicStart + 1}`);

          if(!nombre || nombre === '#N/A'){
            nombre = `Imperdonable ${i - dynamicStart + 1}`;
          }

          const rawVal = norm(row[i]);
          const numericVal = Number(rawVal);
          const done =
            ['1', '1.0', 'SI', 'OK', 'CUMPLIDO'].includes(normUpper(rawVal)) ||
            (!Number.isNaN(numericVal) && numericVal >= 1);

          if(done) cumplidos++;

          imperdonables.push({
            nombre,
            cumplido: done,
            rawVal
          });
        }

        const totalImperdonables = imperdonables.length;

        clients.push({
          key: `${segmento}|${outnum}|${cliente}`,
          segmento,
          outnum,
          cliente,
          ruta: lastRuta,
          jefe: lastJefe,
          detalle: lastDetalle,
          territorio: lastTerritorio,
          cedi: lastCedi,
          totalImperdonables,
          cumplidos,
          porcentaje: pct(cumplidos, totalImperdonables),
          imperdonables
        });
      }

      return clients;
    }

    async function loadData(){
      rawData = [];

      for(const sheet of CONFIG.sheets){
        try{
          const rows = await fetchCSV(sheet.url);
          const clients = buildClientRecords(rows, sheet.segmento);
          rawData.push(...clients);
        } catch(err){
          console.error('Error en hoja', sheet.segmento, err);
        }
      }

      populateFilters();
      applyFilters();

      if(filteredData.length && !selectedKey){
        selectedKey = filteredData[0].key;
      }

      renderDetail();
    }

    function fillSelect(el, values, firstLabel){
      el.innerHTML =
        `<option value="TODOS">${firstLabel}</option>` +
        values.map(v => `<option value="${esc(v)}">${esc(v)}</option>`).join('');
    }

    function populateFilters(){
      fillSelect(document.getElementById('segmentoFilter'), uniq(rawData.map(x => x.segmento)), 'Todos los segmentos');
      fillSelect(document.getElementById('rutaFilter'), uniq(rawData.map(x => x.ruta)), 'Todas las rutas');
      fillSelect(document.getElementById('jefeFilter'), uniq(rawData.map(x => x.jefe)), 'Todos los jefes');
    }

    function applyFilters(){
      const q = normUpper(document.getElementById('searchInput').value);
      const segmento = document.getElementById('segmentoFilter').value;
      const ruta = document.getElementById('rutaFilter').value;
      const jefe = document.getElementById('jefeFilter').value;
      const estado = document.getElementById('estadoFilter').value;

      filteredData = rawData.filter(item => {
        const textHit = !q || [item.cliente, item.outnum, item.ruta, item.jefe, item.segmento, item.detalle, item.territorio]
          .some(v => normUpper(v).includes(q));

        const segmentoHit = segmento === 'TODOS' || item.segmento === segmento;
        const rutaHit = ruta === 'TODOS' || item.ruta === ruta;
        const jefeHit = jefe === 'TODOS' || item.jefe === jefe;
        const estadoHit = estado === 'TODOS' || getTextState(item.porcentaje) === estado;

        return textHit && segmentoHit && rutaHit && jefeHit && estadoHit;
      }).sort((a,b) => {
        if(a.ruta !== b.ruta) return String(a.ruta).localeCompare(String(b.ruta), 'es');
        return String(a.cliente).localeCompare(String(b.cliente), 'es');
      });

      if(selectedKey && !filteredData.some(x => x.key === selectedKey)){
        selectedKey = filteredData[0]?.key || null;
      }

      renderKPIs();
      renderCards();
      renderDetail();
    }

    function renderKPIs(){
      const totalClientes = filteredData.length;
      const totalImperdonables = filteredData.reduce((a,b) => a + b.totalImperdonables, 0);
      const totalCumplidos = filteredData.reduce((a,b) => a + b.cumplidos, 0);
      const avance = pct(totalCumplidos, totalImperdonables);

      document.getElementById('kpiClientes').textContent = totalClientes;
      document.getElementById('kpiImperdonables').textContent = totalImperdonables;
      document.getElementById('kpiCumplidos').textContent = totalCumplidos;
      document.getElementById('kpiAvance').textContent = `${avance}%`;
      document.getElementById('resultInfo').textContent = `${totalClientes} clientes visibles`;
    }

    function renderCards(){
      const box = document.getElementById('cardsContainer');

      if(!filteredData.length){
        box.innerHTML = '<div class="glass rounded-[28px] p-5 text-center text-slate-400">No hay clientes con esos filtros.</div>';
        return;
      }

      box.innerHTML = filteredData.map(item => {
        const barColor = getColorClass(item.porcentaje);
        const pending = Math.max(item.totalImperdonables - item.cumplidos, 0);
        const activeBorder = selectedKey === item.key ? 'border-cyan-400' : 'border-white/5';

        return `
          <button onclick="selectClient('${item.key.replace(/'/g, "\\'")}')" class="glass w-full rounded-[28px] p-4 text-left border ${activeBorder}">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0 flex-1">
                <div class="text-[11px] text-slate-400 uppercase tracking-wide">${esc(item.segmento)} · Ruta ${esc(item.ruta || '-')}</div>
                <div class="font-black text-[17px] leading-tight mt-1">${esc(item.cliente || '-')}</div>
                <div class="text-xs text-slate-400 mt-1 line-clamp-1">Outnum ${esc(item.outnum || '-')} · ${esc(item.jefe || '-')}</div>
                <div class="text-[11px] text-slate-500 mt-1 line-clamp-1">${esc(item.detalle || '-')} · ${esc(item.territorio || '-')}</div>
              </div>
              <div class="shrink-0 rounded-2xl px-3 py-2 ${barColor} text-slate-950 font-black text-sm">${item.porcentaje}%</div>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-4">
              <div class="chip rounded-2xl p-3">
                <div class="text-[10px] text-slate-400">Total</div>
                <div class="text-lg font-black mt-1">${item.totalImperdonables}</div>
              </div>
              <div class="chip rounded-2xl p-3">
                <div class="text-[10px] text-slate-400">OK</div>
                <div class="text-lg font-black mt-1">${item.cumplidos}</div>
              </div>
              <div class="chip rounded-2xl p-3">
                <div class="text-[10px] text-slate-400">Pend.</div>
                <div class="text-lg font-black mt-1">${pending}</div>
              </div>
            </div>

            <div class="mt-4">
              <div class="flex items-center justify-between text-[11px] text-slate-400 mb-2">
                <span>Avance</span>
                <span>${item.cumplidos}/${item.totalImperdonables}</span>
              </div>
              <div class="h-3 rounded-full bg-white/10 overflow-hidden">
                <div class="h-full ${barColor}" style="width:${Math.min(item.porcentaje, 100)}%"></div>
              </div>
            </div>
          </button>
        `;
      }).join('');
    }

    function renderDetail(){
      const panel = document.getElementById('detailPanel');
      const item = rawData.find(x => x.key === selectedKey) || filteredData[0];

      if(!item){
        panel.innerHTML = '<div class="glass rounded-[28px] p-5 text-center text-slate-400">Seleccioná un cliente.</div>';
        return;
      }

      selectedKey = item.key;
      const barColor = getColorClass(item.porcentaje);
      const pendientes = Math.max(item.totalImperdonables - item.cumplidos, 0);

      panel.innerHTML = `
        <div class="glass rounded-[28px] p-4">
          <div class="flex items-start justify-between gap-3">
            <div class="min-w-0 flex-1">
              <div class="text-[11px] text-slate-400 uppercase tracking-wide">${esc(item.segmento)} · Ruta ${esc(item.ruta || '-')}</div>
              <div class="text-[20px] font-black leading-tight mt-1">${esc(item.cliente || '-')}</div>
              <div class="text-sm text-slate-400 mt-1">Outnum ${esc(item.outnum || '-')}</div>
              <div class="text-sm text-slate-400">Jefe: ${esc(item.jefe || '-')}</div>
              <div class="text-sm text-slate-400">Detalle: ${esc(item.detalle || '-')} · Territorio: ${esc(item.territorio || '-')}</div>
              <div class="text-sm text-slate-400">Cedi: ${esc(item.cedi || '-')}</div>
            </div>
            <div class="shrink-0 rounded-2xl px-3 py-2 ${barColor} text-slate-950 font-black">${item.porcentaje}%</div>
          </div>

          <div class="grid grid-cols-3 gap-2 mt-4">
            <div class="chip rounded-2xl p-3">
              <div class="text-[10px] text-slate-400">Total</div>
              <div class="text-xl font-black mt-1">${item.totalImperdonables}</div>
            </div>
            <div class="chip rounded-2xl p-3">
              <div class="text-[10px] text-slate-400">OK</div>
              <div class="text-xl font-black mt-1">${item.cumplidos}</div>
            </div>
            <div class="chip rounded-2xl p-3">
              <div class="text-[10px] text-slate-400">Pend.</div>
              <div class="text-xl font-black mt-1">${pendientes}</div>
            </div>
          </div>

          <div class="mt-4">
            <div class="flex items-center justify-between text-[11px] text-slate-400 mb-2">
              <span>Avance general</span>
              <span>${item.cumplidos}/${item.totalImperdonables}</span>
            </div>
            <div class="h-3 rounded-full bg-white/10 overflow-hidden">
              <div class="h-full ${barColor}" style="width:${Math.min(item.porcentaje,100)}%"></div>
            </div>
          </div>
        </div>

        <div class="glass rounded-[28px] p-4">
          <div class="flex items-center justify-between mb-3">
            <div class="text-base font-black">Imperdonables</div>
            <div class="text-xs text-slate-400">Rojo = pendiente · Verde = cumplido</div>
          </div>

          <div class="space-y-2 max-h-[55vh] overflow-auto scroll-soft pr-1">
            ${item.imperdonables.length ? item.imperdonables.map(imp => `
              <div class="rounded-2xl border ${imp.cumplido ? 'border-emerald-500/25 bg-emerald-500/10' : 'border-rose-500/25 bg-rose-500/10'} px-3 py-3 flex items-center justify-between gap-3">
                <div class="min-w-0 flex-1">
                  <div class="font-bold text-sm leading-tight ${imp.cumplido ? 'line-through text-emerald-300' : 'text-rose-200'}">${esc(getDisplayName(imp.nombre))}</div>
                  <div class="text-[11px] text-slate-400 mt-1">Valor base: ${esc(imp.rawVal || '-')}</div>
                </div>
                <div class="shrink-0">${getBadgeHtml(imp.cumplido)}</div>
              </div>
            `).join('') : '<div class="text-slate-400 text-sm">Sin imperdonables activos.</div>'}
          </div>
        </div>
      `;
    }

    function selectClient(key){
      selectedKey = key;
      renderCards();
      renderDetail();
      showDetalle();
    }
    window.selectClient = selectClient;

    function showClientes(){
      document.getElementById('clientesView').classList.remove('hidden-view');
      document.getElementById('detalleView').classList.add('hidden-view');
      document.getElementById('tabClientes').className = 'btn bg-cyan-400 text-slate-950';
      document.getElementById('tabDetalle').className = 'btn chip';
    }

    function showDetalle(){
      document.getElementById('clientesView').classList.add('hidden-view');
      document.getElementById('detalleView').classList.remove('hidden-view');
      document.getElementById('tabDetalle').className = 'btn bg-cyan-400 text-slate-950';
      document.getElementById('tabClientes').className = 'btn chip';
    }

    document.getElementById('tabClientes').addEventListener('click', showClientes);
    document.getElementById('tabDetalle').addEventListener('click', showDetalle);
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('segmentoFilter').addEventListener('change', applyFilters);
    document.getElementById('rutaFilter').addEventListener('change', applyFilters);
    document.getElementById('jefeFilter').addEventListener('change', applyFilters);
